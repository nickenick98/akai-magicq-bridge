<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>APC MagicQ Bridge</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="bridge-fallback" style="font-family: Arial, sans-serif; padding: 24px; color: #e5efe8; background: #101412; min-height: 100vh;">
      <h1 style="margin: 0 0 8px;">APC MagicQ Bridge</h1>
      <p style="margin: 0 0 16px;">Frontend wird geladen...</p>
      <p style="margin: 0; color: #9fb3a8;">Wenn diese Meldung bleibt: Browser neu laden oder den Service neu starten.</p>
      <pre id="bridge-fallback-error" style="display: none; margin-top: 16px; padding: 12px; max-width: 960px; overflow: auto; color: #ffd4d4; background: #2a1111; border: 1px solid #763232; white-space: pre-wrap;"></pre>
    </div>
    <script>
      window.__akaiBridgeShowFallbackError = (message) => {
        const fallback = document.getElementById('bridge-fallback');
        const output = document.getElementById('bridge-fallback-error');
        if (!fallback || !output) return;
        output.style.display = 'block';
        output.textContent = String(message || 'Unbekannter Frontend-Fehler');
      };
      window.__akaiBridgeHideFallback = () => {
        const fallback = document.getElementById('bridge-fallback');
        if (fallback) fallback.remove();
      };
      window.addEventListener('error', (event) => {
        var errorMessage = event && event.error && event.error.message ? event.error.message : '';
        window.__akaiBridgeShowFallbackError((event && event.message) || errorMessage || (event && event.filename));
      });
      window.addEventListener('unhandledrejection', (event) => {
        var reason = event && event.reason ? event.reason : '';
        var reasonMessage = reason && reason.message ? reason.message : '';
        var reasonStack = reason && reason.stack ? reason.stack : '';
        window.__akaiBridgeShowFallbackError(reasonStack || reasonMessage || reason);
      });
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
